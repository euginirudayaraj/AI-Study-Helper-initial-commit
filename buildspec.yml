version: 0.2

env:
  variables:
    AWS_REGION: "us-east-1"
    LAMBDA_EXECUTION_ROLE_ARN: "arn:aws:iam::145292399647:role/flowbridge-sbx-lambda-execution-role"
    LAMBDA_RUNTIME: "python3.12"
    LAMBDA_HANDLER: "lambda_function.lambda_handler"
    LAMBDA_MEMORY_SIZE: "256"
    LAMBDA_TIMEOUT: "30"

phases:
  install:
    commands:
      - echo "Checking AWS CLI, Git, and zip"
      - aws --version
      - git --version
      - which zip || yum install -y zip

  pre_build:
    commands:
      - echo "Starting changed Lambda deployment"
      - echo "Current commit:"
      - git rev-parse HEAD
      - echo "Trying to fetch previous commit history"
      - git fetch --unshallow || true
      - git fetch origin main --depth=2 || true

  build:
    commands:
      - |
        set -e

        if git rev-parse HEAD~1 >/dev/null 2>&1; then
          echo "Previous commit found. Deploying only changed Lambda files."
          changed_files=$(git diff --name-only HEAD~1 HEAD -- 'lambdas/*.py' || true)
        else
          echo "Previous commit not found. Deploying all Lambda files once."
          changed_files=$(find lambdas -maxdepth 1 -type f -name "*.py")
        fi

        echo "Changed files:"
        echo "$changed_files"

        if [ -z "$changed_files" ]; then
          echo "No changed Lambda files found in lambdas/*.py"
          echo "Nothing to deploy"
          exit 0
        fi

        for lambda_file in $changed_files; do
          if [ -f "$lambda_file" ]; then
            function_name=$(basename "$lambda_file" .py)

            echo "----------------------------------------"
            echo "Deploying Lambda: $function_name"
            echo "Source file: $lambda_file"

            if [ ! -s "$lambda_file" ]; then
              echo "ERROR: $lambda_file is empty. Stopping deployment."
              exit 1
            fi

            if ! grep -q "def lambda_handler" "$lambda_file"; then
              echo "ERROR: lambda_handler not found in $lambda_file. Stopping deployment."
              exit 1
            fi

            rm -rf build
            mkdir -p build

            cp "$lambda_file" build/lambda_function.py

            cd build
            zip -r "../${function_name}.zip" .
            cd ..

            if aws lambda get-function --function-name "$function_name" --region "$AWS_REGION" > /dev/null 2>&1; then
              echo "Lambda exists. Updating code: $function_name"

              aws lambda update-function-code \
                --function-name "$function_name" \
                --zip-file "fileb://${function_name}.zip" \
                --region "$AWS_REGION"

              echo "Update completed for: $function_name"

            else
              echo "Lambda does not exist. Creating function: $function_name"

              aws lambda create-function \
                --function-name "$function_name" \
                --runtime "$LAMBDA_RUNTIME" \
                --role "$LAMBDA_EXECUTION_ROLE_ARN" \
                --handler "$LAMBDA_HANDLER" \
                --zip-file "fileb://${function_name}.zip" \
                --memory-size "$LAMBDA_MEMORY_SIZE" \
                --timeout "$LAMBDA_TIMEOUT" \
                --region "$AWS_REGION" \
                --tags '{"Project":"flowbridge","Environment":"sbx","ManagedBy":"codebuild"}'

              echo "Create completed for: $function_name"
            fi
          fi
        done

  post_build:
    commands:
      - echo "Changed Lambda deployment completed"